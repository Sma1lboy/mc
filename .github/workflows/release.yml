name: Release

# Push a tag like `v0.1.0` (use scripts/release.sh) to build platform bundles
# and publish them directly to a GitHub Release (never a draft; see releaseDraft below).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest      # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo (tauri crate is its own workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      # npm workspaces:唯一 lockfile 在仓库根,必须在根安装(desktop/package-lock.json 已废弃)。
      - name: Install frontend deps
        run: npm ci

      # Release notes = CHANGELOG.md 里当前版本的完整段落(本版 → 上一版的全部内容,
      # changesets 风格,而非一句 "See CHANGELOG")。release.sh 打版时已把 Unreleased
      # 提升为该段落;段落缺失时回退到 CHANGELOG 链接,保证发布不为空。
      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { on=1; next }
            on && /^## \[/ { exit }
            on { print }
          ' CHANGELOG.md)
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/Sma1lboy/mc/blob/main/CHANGELOG.md)."
          fi
          {
            echo "body<<NOTES_EOF"
            printf '%s\n' "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      # Download EasyTier into desktop/src-tauri/resources/easytier/ so it's bundled
      # into the .app (联机大厅). Per-host binaries; gitignored, fetched at build time.
      - name: Bundle EasyTier binaries
        run: bash scripts/fetch-easytier.sh

      - name: Build app + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional secrets — baked into the release binary (option_env!). Leave unset to
          # ship without them (Microsoft login / CurseForge then need per-user config).
          MC_MSA_CLIENT_ID: ${{ secrets.MC_MSA_CLIENT_ID }}
          MC_CF_API_KEY: ${{ secrets.MC_CF_API_KEY }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'kobeMC ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
