name: Release

# Push a tag like `v0.1.0` (use scripts/release.sh) to build platform bundles
# and publish them directly to a GitHub Release (never a draft; see releaseDraft below).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest      # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo (tauri crate is its own workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend deps
        working-directory: desktop
        run: npm ci

      # Download EasyTier into desktop/src-tauri/resources/easytier/ so it's bundled
      # into the .app (联机大厅). Per-host binaries; gitignored, fetched at build time.
      - name: Bundle EasyTier binaries
        run: bash scripts/fetch-easytier.sh

      - name: Build app + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional secrets — baked into the release binary (option_env!). Leave unset to
          # ship without them (Microsoft login / CurseForge then need per-user config).
          MC_MSA_CLIENT_ID: ${{ secrets.MC_MSA_CLIENT_ID }}
          MC_CF_API_KEY: ${{ secrets.MC_CF_API_KEY }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'kobeMC ${{ github.ref_name }}'
          releaseBody: 'See [CHANGELOG.md](https://github.com/Sma1lboy/mc/blob/main/CHANGELOG.md).'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
