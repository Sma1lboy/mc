<!doctype html><html><head><meta charset="utf-8"><style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 360px; }
  body {
    font-family: -apple-system, "PingFang SC", "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(120% 140% at 12% -10%, #eaf1fd 0%, #f4f8fc 50%, #ffffff 100%);
    color: #16202e;
    -webkit-font-smoothing: antialiased;
    position: relative; overflow: hidden;
  }
  .glow { position: absolute; inset: 0; background: radial-gradient(40% 80% at 82% 30%, rgba(19,112,243,.14), transparent 70%); }
  /* faint inner frosted border for the glass feel */
  .frame { position: absolute; inset: 14px; border: 1px solid rgba(19,112,243,.14);
            border-radius: 22px; background: rgba(19,112,243,.04); backdrop-filter: blur(2px); }
  .wrap { position: absolute; inset: 14px; display: flex; align-items: center;
           padding: 0 60px; gap: 40px; }
  .left { flex: 1; min-width: 0; }
  .eyebrow { font-size: 14px; letter-spacing: 4px; font-weight: 700;
              color: #5d6b7e; text-transform: uppercase; }
  .word { font-size: 94px; font-weight: 800; letter-spacing: -2px; line-height: 1.02;
           margin-top: 10px; }
  .word .mc { color: #1370f3; }
  .tag-cn { font-size: 23px; font-weight: 600; margin-top: 14px; }
  .tag-en { font-size: 15px; color: #5d6b7e; margin-top: 5px; letter-spacing: .2px; }
  .chips { display: flex; gap: 10px; margin-top: 22px; }
  .chip { font-size: 13px; font-weight: 600; color: #3a567c;
           background: rgba(19,112,243,.07); border: 1px solid rgba(19,112,243,.18);
           padding: 7px 14px; border-radius: 999px; }
  .pix { position: relative; width: 240px; height: 280px; flex: 0 0 240px; }
  .px { position: absolute; width: 46px; height: 46px; border-radius: 7px;
         background: #1370f3; box-shadow: 0 6px 18px rgba(0,0,0,.12); }
</style></head><body>
