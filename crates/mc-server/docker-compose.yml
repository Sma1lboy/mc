# Local Postgres for mc-server dev + integration tests (no Supabase needed).
#
#   cd crates/mc-server && docker compose up -d --wait
#   export DATABASE_URL=postgres://mc:mc@127.0.0.1:55432/mc_server   # run the server
#   export TEST_DATABASE_URL=postgres://mc:mc@127.0.0.1:55432/mc_server  # run the tests
#   docker compose down   # stop (data is disposable, not persisted)
#
# Or just run `scripts/test-server.sh`, which brings this up and runs the tests.
# Port 55432 avoids clashing with a local Postgres on 5432. PG16 ships
# gen_random_uuid()/md5() built-in, so no extensions are required.
services:
  db:
    image: postgres:16-alpine
    container_name: mc-server-testdb
    environment:
      POSTGRES_USER: mc
      POSTGRES_PASSWORD: mc
      POSTGRES_DB: mc_server
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc -d mc_server"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data # ephemeral: fresh DB each run
